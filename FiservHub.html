<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiservHub — Central de Links</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23FF6600'/><text x='16' y='21' text-anchor='middle' fill='white' font-size='14' font-family='system-ui' font-weight='700'>F</text></svg>">
<style>
/* ============================================
   DESIGN TOKENS — Linear-inspired
   ============================================ */
:root {
  /* Surfaces — never pure black */
  --bg-base: #0a0a0f;
  --bg-elevated: #111118;
  --bg-surface: #16161e;
  --bg-overlay: #1c1c26;
  --bg-hover: #22222e;
  --bg-active: #282836;

  /* Borders — ghost-like */
  --border-ghost: rgba(255, 255, 255, 0.06);
  --border-subtle: rgba(255, 255, 255, 0.09);
  --border-focus: rgba(255, 102, 0, 0.4);

  /* Text */
  --text-primary: #e8e8ed;
  --text-secondary: #8b8b9e;
  --text-tertiary: #5c5c72;
  --text-muted: #3e3e52;

  /* Accent — Fiserv Orange */
  --accent: #ff6600;
  --accent-glow: rgba(255, 102, 0, 0.12);
  --accent-glow-strong: rgba(255, 102, 0, 0.25);
  --accent-subtle: rgba(255, 102, 0, 0.08);
  --accent-text: #ff8533;

  /* Feedback */
  --danger: #e5484d;
  --danger-glow: rgba(229, 72, 77, 0.15);
  --success: #30a46c;

  /* Spacing scale */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --radius-full: 9999px;

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3), 0 0 1px rgba(0, 0, 0, 0.2);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4), 0 0 1px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 1px rgba(0, 0, 0, 0.3);
  --shadow-glow: 0 0 20px rgba(255, 102, 0, 0.08);

  /* Transitions */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;

  /* Typography */
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
}

/* ============================================
   RESET & BASE
   ============================================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
}

/* ============================================
   AMBIENT BACKGROUND — Infinite depth feel
   ============================================ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255, 102, 0, 0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255, 102, 0, 0.02) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(100, 80, 255, 0.015) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Subtle noise texture for depth */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.015;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  pointer-events: none;
  z-index: 0;
}

/* Grid pattern — very subtle */
.grid-overlay {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 40%, black, transparent);
}

/* ============================================
   SCROLLBAR
   ============================================ */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: var(--border-subtle);
  border-radius: var(--radius-full);
}
::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.14);
}

/* ============================================
   TOP BAR — Floating navigation
   ============================================ */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--space-8);
  background: rgba(10, 10, 15, 0.7);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border-ghost);
  transition: background var(--duration-normal) var(--ease-out);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: var(--space-4);
}

.logo-mark {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent) 0%, #e65500 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: white;
  box-shadow: 0 0 16px rgba(255, 102, 0, 0.2);
  flex-shrink: 0;
}

.logo-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.3px;
}

.logo-text span {
  color: var(--text-tertiary);
  font-weight: 400;
}

/* Search bar */
.search-container {
  position: relative;
  width: 320px;
}

.search-input {
  width: 100%;
  height: 36px;
  padding: 0 var(--space-4) 0 36px;
  background: var(--bg-surface);
  border: 1px solid var(--border-ghost);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font-sans);
  outline: none;
  transition: all var(--duration-normal) var(--ease-out);
}

.search-input::placeholder {
  color: var(--text-tertiary);
}

.search-input:focus {
  border-color: var(--border-focus);
  background: var(--bg-overlay);
  box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-sm);
}

.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-tertiary);
  pointer-events: none;
  transition: color var(--duration-fast);
}

.search-input:focus ~ .search-icon {
  color: var(--accent-text);
}

.search-shortcut {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--bg-hover);
  border: 1px solid var(--border-ghost);
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-tertiary);
  pointer-events: none;
  line-height: 1.4;
}

/* Topbar right */
.topbar-right {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.btn-icon {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
}

.btn-icon:hover {
  background: var(--bg-hover);
  border-color: var(--border-ghost);
  color: var(--text-primary);
}

.btn-icon:active {
  background: var(--bg-active);
  transform: scale(0.96);
}

.btn-primary {
  height: 36px;
  padding: 0 var(--space-4);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  border-radius: var(--radius-md);
  background: var(--accent);
  border: none;
  color: white;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
  white-space: nowrap;
}

.btn-primary:hover {
  background: #e65c00;
  box-shadow: 0 0 20px rgba(255, 102, 0, 0.25);
}

.btn-primary:active {
  background: #cc5200;
  transform: scale(0.97);
}

.btn-primary svg {
  width: 15px;
  height: 15px;
}

/* Fiserv badge */
.fiserv-badge {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--accent), #cc5200);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all var(--duration-normal) var(--ease-out);
  border: 2px solid rgba(255, 102, 0, 0.2);
  font-size: 11px;
  font-weight: 700;
  color: white;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}

.fiserv-badge::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: inherit;
  background: conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.15), transparent);
  animation: badge-shimmer 4s linear infinite;
}

@keyframes badge-shimmer {
  to { transform: rotate(360deg); }
}

.fiserv-badge span {
  position: relative;
  z-index: 1;
}

.fiserv-badge:hover {
  transform: scale(1.08);
  box-shadow: 0 0 24px rgba(255, 102, 0, 0.35);
  border-color: rgba(255, 102, 0, 0.5);
}

.fiserv-badge:active {
  transform: scale(0.98);
}

/* ============================================
   MAIN CONTENT
   ============================================ */
.main {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: calc(56px + var(--space-10)) var(--space-8) var(--space-16);
}

/* Header section */
.page-header {
  margin-bottom: var(--space-10);
}

.page-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.8px;
  color: var(--text-primary);
  line-height: 1.2;
}

.page-subtitle {
  font-size: 14px;
  color: var(--text-tertiary);
  margin-top: var(--space-2);
  font-weight: 400;
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: var(--space-6);
  margin-top: var(--space-5);
}

.stat-item {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: 12px;
  color: var(--text-tertiary);
}

.stat-dot {
  width: 6px;
  height: 6px;
  border-radius: var(--radius-full);
  background: var(--accent);
  opacity: 0.6;
}

.stat-value {
  color: var(--text-secondary);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

/* ============================================
   CATEGORY SECTIONS
   ============================================ */
.category-section {
  margin-bottom: var(--space-10);
  animation: sectionIn 0.5s var(--ease-out) both;
}

@keyframes sectionIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.category-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-4);
  padding-bottom: var(--space-3);
  border-bottom: 1px solid var(--border-ghost);
}

.category-title-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.category-icon {
  width: 20px;
  height: 20px;
  border-radius: var(--radius-sm);
  background: var(--accent-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent-text);
  flex-shrink: 0;
}

.category-icon svg {
  width: 12px;
  height: 12px;
}

.category-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: -0.1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: color var(--duration-fast);
  background: none;
  border: none;
  font-family: var(--font-sans);
  padding: 0;
}

.category-title:hover {
  color: var(--text-primary);
}

.category-count {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  padding: 2px 7px;
  border-radius: var(--radius-full);
  background: var(--bg-surface);
  font-variant-numeric: tabular-nums;
}

.category-actions {
  display: flex;
  gap: var(--space-1);
}

.btn-ghost {
  height: 28px;
  padding: 0 var(--space-2);
  display: flex;
  align-items: center;
  gap: var(--space-1);
  border-radius: var(--radius-sm);
  background: transparent;
  border: none;
  color: var(--text-tertiary);
  font-size: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
}

.btn-ghost:hover {
  background: var(--bg-hover);
  color: var(--text-secondary);
}

.btn-ghost:active {
  background: var(--bg-active);
}

.btn-ghost svg {
  width: 14px;
  height: 14px;
}

.btn-ghost.danger:hover {
  background: var(--danger-glow);
  color: var(--danger);
}

/* ============================================
   LINK CARDS — Floating, elevated
   ============================================ */
.links-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--space-3);
}

.link-card {
  position: relative;
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  background: var(--bg-elevated);
  border: 1px solid var(--border-ghost);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--duration-normal) var(--ease-out);
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  animation: cardIn 0.35s var(--ease-out) both;
}

@keyframes cardIn {
  from {
    opacity: 0;
    transform: translateY(8px) scale(0.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* Glow effect on hover */
.link-card::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(255, 102, 0, 0.1), transparent 40%);
  opacity: 0;
  transition: opacity var(--duration-normal) var(--ease-out);
  pointer-events: none;
}

.link-card:hover {
  border-color: var(--border-subtle);
  background: var(--bg-surface);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md), 0 0 20px rgba(255, 102, 0, 0.03);
}

.link-card:hover::before {
  opacity: 1;
}

.link-card:active {
  transform: translateY(0);
  background: var(--bg-overlay);
}

.link-favicon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  background: var(--bg-surface);
  border: 1px solid var(--border-ghost);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
  transition: border-color var(--duration-fast);
}

.link-card:hover .link-favicon {
  border-color: var(--border-subtle);
}

.link-favicon img {
  width: 20px;
  height: 20px;
  object-fit: contain;
}

.link-favicon .fallback-icon {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-tertiary);
  text-transform: uppercase;
  line-height: 1;
}

.link-info {
  flex: 1;
  min-width: 0;
  position: relative;
  z-index: 1;
}

.link-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
  transition: color var(--duration-fast);
}

.link-card:hover .link-name {
  color: white;
}

.link-url {
  font-size: 11px;
  color: var(--text-tertiary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
  transition: color var(--duration-fast);
}

.link-card:hover .link-url {
  color: var(--text-secondary);
}

.link-delete {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  opacity: 0;
  transition: all var(--duration-fast) var(--ease-out);
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}

.link-card:hover .link-delete {
  opacity: 1;
  color: var(--text-tertiary);
}

.link-delete:hover {
  background: var(--danger-glow);
  color: var(--danger) !important;
}

.link-delete:active {
  transform: scale(0.9);
}

.link-delete svg {
  width: 14px;
  height: 14px;
}

/* ============================================
   EMPTY STATE
   ============================================ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-16) var(--space-8);
  text-align: center;
}

.empty-icon {
  width: 56px;
  height: 56px;
  border-radius: var(--radius-lg);
  background: var(--bg-surface);
  border: 1px solid var(--border-ghost);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: var(--space-5);
  color: var(--text-tertiary);
}

.empty-icon svg {
  width: 24px;
  height: 24px;
}

.empty-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: var(--space-2);
}

.empty-description {
  font-size: 13px;
  color: var(--text-tertiary);
  max-width: 300px;
}

/* No results from search */
.no-results {
  text-align: center;
  padding: var(--space-12) var(--space-8);
  color: var(--text-tertiary);
  font-size: 14px;
}

.no-results-icon {
  font-size: 32px;
  margin-bottom: var(--space-3);
  opacity: 0.5;
}

/* ============================================
   MODAL SYSTEM
   ============================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  opacity: 0;
  visibility: hidden;
  transition: all var(--duration-normal) var(--ease-out);
}

.modal-overlay.active {
  opacity: 1;
  visibility: visible;
}

.modal {
  width: 100%;
  max-width: 460px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg), 0 0 60px rgba(0, 0, 0, 0.3);
  transform: scale(0.95) translateY(10px);
  transition: transform var(--duration-normal) var(--ease-out);
  overflow: hidden;
}

.modal-overlay.active .modal {
  transform: scale(1) translateY(0);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-5) var(--space-6);
  border-bottom: 1px solid var(--border-ghost);
}

.modal-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.2px;
}

.modal-close {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  background: transparent;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all var(--duration-fast);
}

.modal-close:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.modal-body {
  padding: var(--space-6);
}

.modal-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: var(--space-2);
  padding: var(--space-4) var(--space-6);
  border-top: 1px solid var(--border-ghost);
}

/* Form elements */
.form-group {
  margin-bottom: var(--space-4);
}

.form-group:last-child {
  margin-bottom: 0;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: var(--space-2);
  letter-spacing: 0.2px;
}

.form-input, .form-select {
  width: 100%;
  height: 38px;
  padding: 0 var(--space-3);
  background: var(--bg-surface);
  border: 1px solid var(--border-ghost);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font-sans);
  outline: none;
  transition: all var(--duration-fast) var(--ease-out);
  appearance: none;
}

.form-select {
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9l6 6 6-6' stroke='%235c5c72' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
  padding-right: 32px;
}

.form-input::placeholder {
  color: var(--text-muted);
}

.form-input:focus, .form-select:focus {
  border-color: var(--border-focus);
  background: var(--bg-overlay);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.form-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: var(--space-1);
}

/* Buttons in modals */
.btn-modal {
  height: 34px;
  padding: 0 var(--space-4);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  border-radius: var(--radius-md);
  border: 1px solid var(--border-ghost);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
}

.btn-cancel {
  background: var(--bg-surface);
  color: var(--text-secondary);
}

.btn-cancel:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--border-subtle);
}

.btn-confirm {
  background: var(--accent);
  color: white;
  border-color: transparent;
}

.btn-confirm:hover {
  background: #e65c00;
  box-shadow: 0 0 16px rgba(255, 102, 0, 0.2);
}

.btn-confirm:active {
  transform: scale(0.97);
}

.btn-danger {
  background: var(--danger);
  color: white;
  border-color: transparent;
}

.btn-danger:hover {
  background: #d13438;
  box-shadow: 0 0 16px rgba(229, 72, 77, 0.2);
}

/* ============================================
   FISERV ABOUT MODAL
   ============================================ */
.about-content {
  text-align: center;
  padding: var(--space-6) var(--space-4);
}

.about-logo {
  width: 64px;
  height: 64px;
  border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--accent), #e65500);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto var(--space-5);
  font-size: 24px;
  font-weight: 800;
  color: white;
  box-shadow: 0 0 40px rgba(255, 102, 0, 0.3);
  position: relative;
}

.about-logo::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: inherit;
  border: 1px solid rgba(255, 102, 0, 0.2);
  animation: pulse-ring 3s ease-in-out infinite;
}

@keyframes pulse-ring {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.5; }
}

.about-brand {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent-text);
  letter-spacing: -0.5px;
  margin-bottom: var(--space-4);
}

.about-divider {
  width: 40px;
  height: 1px;
  background: var(--border-subtle);
  margin: 0 auto var(--space-4);
}

.about-dev {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.about-dev strong {
  color: var(--text-primary);
  font-weight: 600;
}

.about-version {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: var(--space-4);
  font-family: var(--font-mono);
}

/* ============================================
   CONFIRM MODAL
   ============================================ */
.confirm-content {
  text-align: center;
  padding: var(--space-4) 0;
}

.confirm-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-full);
  background: var(--danger-glow);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto var(--space-4);
  color: var(--danger);
}

.confirm-icon svg {
  width: 22px;
  height: 22px;
}

.confirm-message {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.confirm-message strong {
  color: var(--text-primary);
}

/* ============================================
   CATEGORY EDIT INLINE
   ============================================ */
.category-edit-input {
  background: var(--bg-surface);
  border: 1px solid var(--border-focus);
  border-radius: var(--radius-sm);
  padding: 2px 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  font-family: var(--font-sans);
  text-transform: uppercase;
  letter-spacing: -0.1px;
  outline: none;
  box-shadow: 0 0 0 3px var(--accent-glow);
  width: 180px;
}

/* ============================================
   TOAST NOTIFICATIONS
   ============================================ */
.toast-container {
  position: fixed;
  bottom: var(--space-6);
  right: var(--space-6);
  z-index: 2000;
  display: flex;
  flex-direction: column-reverse;
  gap: var(--space-2);
}

.toast {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  background: var(--bg-overlay);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  font-size: 13px;
  color: var(--text-primary);
  min-width: 240px;
  animation: toastIn 0.4s var(--ease-spring);
  backdrop-filter: blur(12px);
}

.toast.toast-out {
  animation: toastOut 0.3s var(--ease-out) forwards;
}

@keyframes toastIn {
  from {
    opacity: 0;
    transform: translateY(8px) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes toastOut {
  to {
    opacity: 0;
    transform: translateX(20px);
  }
}

.toast-dot {
  width: 6px;
  height: 6px;
  border-radius: var(--radius-full);
  flex-shrink: 0;
}

.toast-dot.success { background: var(--success); }
.toast-dot.danger { background: var(--danger); }
.toast-dot.info { background: var(--accent); }

/* ============================================
   KEYBOARD SHORTCUTS HINT
   ============================================ */
.kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  height: 20px;
  padding: 0 5px;
  border-radius: 4px;
  background: var(--bg-hover);
  border: 1px solid var(--border-ghost);
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-tertiary);
  line-height: 1;
}

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 768px) {
  .topbar {
    padding: 0 var(--space-4);
  }

  .search-container {
    width: 180px;
  }

  .search-shortcut {
    display: none;
  }

  .main {
    padding: calc(56px + var(--space-6)) var(--space-4) var(--space-10);
  }

  .links-grid {
    grid-template-columns: 1fr;
  }

  .page-title {
    font-size: 22px;
  }

  .btn-primary span.btn-label {
    display: none;
  }
}

@media (max-width: 480px) {
  .search-container {
    width: 140px;
  }

  .stats-bar {
    flex-wrap: wrap;
    gap: var(--space-3);
  }
}

/* ============================================
   FOCUS VISIBLE — Accessibility
   ============================================ */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

button:focus:not(:focus-visible),
a:focus:not(:focus-visible),
input:focus:not(:focus-visible) {
  outline: none;
}

/* ============================================
   SELECTION
   ============================================ */
::selection {
  background: rgba(255, 102, 0, 0.25);
  color: white;
}
</style>
</head>
<body>

<!-- Ambient grid overlay -->
<div class="grid-overlay"></div>

<!-- ===== TOP BAR ===== -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">F</div>
    <div class="logo-text">FiservHub <span>/ links</span></div>
  </div>

  <div class="search-container">
    <input
      type="text"
      class="search-input"
      id="searchInput"
      placeholder="Buscar links ou grupos..."
      autocomplete="off"
      spellcheck="false"
    >
    <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <span class="search-shortcut">/</span>
  </div>

  <div class="topbar-right">
    <button class="btn-primary" id="btnAddLink" title="Adicionar link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      <span class="btn-label">Novo Link</span>
    </button>

    <button class="btn-icon" id="btnAddCategory" title="Novo grupo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
      </svg>
    </button>

    <div class="fiserv-badge" id="fiservBadge" title="Sobre o FiservHub">
      <span>F</span>
    </div>
  </div>
</header>

<!-- ===== MAIN CONTENT ===== -->
<main class="main" id="mainContent">
  <!-- Header injected by JS -->
</main>

<!-- ===== TOAST CONTAINER ===== -->
<div class="toast-container" id="toastContainer"></div>

<!-- ===== MODAL: Add Link ===== -->
<div class="modal-overlay" id="modalAddLink">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Novo link</span>
      <button class="modal-close" data-close-modal="modalAddLink">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nome do site</label>
        <input type="text" class="form-input" id="inputLinkName" placeholder="Ex: Portal Fiserv" autocomplete="off" spellcheck="false">
      </div>
      <div class="form-group">
        <label class="form-label">URL</label>
        <input type="url" class="form-input" id="inputLinkUrl" placeholder="https://exemplo.com" autocomplete="off" spellcheck="false">
        <div class="form-hint">O favicon será carregado automaticamente</div>
      </div>
      <div class="form-group">
        <label class="form-label">Grupo</label>
        <select class="form-select" id="inputLinkGroup"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-modal btn-cancel" data-close-modal="modalAddLink">Cancelar</button>
      <button class="btn-modal btn-confirm" id="btnConfirmAdd">Adicionar</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: Add Category ===== -->
<div class="modal-overlay" id="modalAddCategory">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Novo grupo</span>
      <button class="modal-close" data-close-modal="modalAddCategory">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nome do grupo</label>
        <input type="text" class="form-input" id="inputCategoryName" placeholder="Ex: Ferramentas de Atendimento" autocomplete="off" spellcheck="false">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-modal btn-cancel" data-close-modal="modalAddCategory">Cancelar</button>
      <button class="btn-modal btn-confirm" id="btnConfirmCategory">Criar grupo</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: Confirm Delete ===== -->
<div class="modal-overlay" id="modalConfirm">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Confirmar exclusão</span>
      <button class="modal-close" data-close-modal="modalConfirm">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="confirm-content">
        <div class="confirm-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
          </svg>
        </div>
        <p class="confirm-message" id="confirmMessage">Tem certeza que deseja excluir este site?</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-modal btn-cancel" data-close-modal="modalConfirm">Cancelar</button>
      <button class="btn-modal btn-danger" id="btnConfirmDelete">Excluir</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: About Fiserv ===== -->
<div class="modal-overlay" id="modalAbout">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Sobre</span>
      <button class="modal-close" data-close-modal="modalAbout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="about-content">
        <div class="about-logo">F</div>
        <div class="about-brand">Fiserv</div>
        <div class="about-divider"></div>
        <p class="about-dev">Desenvolvido por<br><strong>Leonardo Vasconcelos</strong></p>
        <div class="about-version">FiservHub v1.0.0</div>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================
   DATA LAYER — localStorage persistence
   ============================================ */
const STORAGE_KEY = 'fiservhub_data';

const DEFAULT_DATA = {
  categories: [
    { id: crypto.randomUUID(), name: 'Portais', order: 0 },
    { id: crypto.randomUUID(), name: 'Ferramentas de Atendimento', order: 1 },
    { id: crypto.randomUUID(), name: 'Parceiros', order: 2 }
  ],
  links: []
};

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Ensure every category and link has an id
      if (parsed.categories) {
        parsed.categories.forEach(c => { if (!c.id) c.id = crypto.randomUUID(); });
      }
      if (parsed.links) {
        parsed.links.forEach(l => { if (!l.id) l.id = crypto.randomUUID(); });
      }
      return parsed;
    }
  } catch (e) {
    console.warn('FiservHub: failed to load data', e);
  }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.warn('FiservHub: failed to save data', e);
  }
}

let appData = loadData();

/* ============================================
   FAVICON HELPER
   ============================================ */
function getFaviconUrl(url) {
  try {
    const u = new URL(url);
    // Use Google's favicon service — reliable and fast
    return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(u.hostname)}&sz=64`;
  } catch {
    return null;
  }
}

function getDomain(url) {
  try {
    return new URL(url).hostname.replace('www.', '');
  } catch {
    return url;
  }
}

/* ============================================
   TOAST SYSTEM
   ============================================ */
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<span class="toast-dot ${type}"></span><span>${escapeHTML(message)}</span>`;
  container.appendChild(toast);

  setTimeout(() => {
    toast.classList.add('toast-out');
    toast.addEventListener('animationend', () => toast.remove());
  }, 2800);
}

/* ============================================
   MODAL SYSTEM
   ============================================ */
function openModal(id) {
  const overlay = document.getElementById(id);
  if (!overlay) return;
  overlay.classList.add('active');
  // Focus first input if exists
  requestAnimationFrame(() => {
    const input = overlay.querySelector('input, select');
    if (input) input.focus();
  });
}

function closeModal(id) {
  const overlay = document.getElementById(id);
  if (!overlay) return;
  overlay.classList.remove('active');
}

// Close modal on overlay click
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay') && e.target.classList.contains('active')) {
    e.target.classList.remove('active');
  }
  // Close buttons
  const closeBtn = e.target.closest('[data-close-modal]');
  if (closeBtn) {
    closeModal(closeBtn.dataset.closeModal);
  }
});

// Escape key closes modals
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
  }
  // "/" shortcut for search
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && !isInputFocused()) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

function isInputFocused() {
  const el = document.activeElement;
  return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT' || el.isContentEditable);
}

/* ============================================
   HTML ESCAPE — security
   ============================================ */
function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ============================================
   URL VALIDATION
   ============================================ */
function isValidUrl(str) {
  try {
    const u = new URL(str);
    return u.protocol === 'http:' || u.protocol === 'https:';
  } catch {
    return false;
  }
}

/* ============================================
   RENDER ENGINE
   ============================================ */
function render(searchQuery = '') {
  const main = document.getElementById('mainContent');
  const query = searchQuery.toLowerCase().trim();

  // Filter data
  let filteredCategories = appData.categories
    .slice()
    .sort((a, b) => (a.order || 0) - (b.order || 0));

  const totalLinks = appData.links.length;
  const totalCategories = appData.categories.length;

  // Build HTML
  let html = `
    <div class="page-header">
      <h1 class="page-title">Links da equipe</h1>
      <p class="page-subtitle">Central de acesso rápido às ferramentas e plataformas</p>
      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-dot"></span>
          <span class="stat-value">${totalLinks}</span> links
        </div>
        <div class="stat-item">
          <span class="stat-dot"></span>
          <span class="stat-value">${totalCategories}</span> grupos
        </div>
      </div>
    </div>
  `;

  let hasVisibleContent = false;

  filteredCategories.forEach((category, catIdx) => {
    let links = appData.links.filter(l => l.categoryId === category.id);

    if (query) {
      links = links.filter(l =>
        l.name.toLowerCase().includes(query) ||
        l.url.toLowerCase().includes(query) ||
        category.name.toLowerCase().includes(query)
      );
    }

    // Show category if it has links or if not searching
    if (links.length === 0 && query) return;

    hasVisibleContent = true;

    html += `
      <section class="category-section" style="animation-delay: ${catIdx * 60}ms" data-category-id="${category.id}">
        <div class="category-header">
          <div class="category-title-row">
            <div class="category-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
              </svg>
            </div>
            <button class="category-title" data-action="rename-category" data-id="${category.id}" title="Clique para renomear">${escapeHTML(category.name)}</button>
            <span class="category-count">${links.length}</span>
          </div>
          <div class="category-actions">
            <button class="btn-ghost danger" data-action="delete-category" data-id="${category.id}" title="Excluir grupo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="links-grid">
    `;

    if (links.length > 0) {
      links.forEach((link, linkIdx) => {
        const faviconUrl = getFaviconUrl(link.url);
        const domain = getDomain(link.url);
        const initial = link.name.charAt(0).toUpperCase();

        html += `
          <a href="${escapeHTML(link.url)}" target="_blank" rel="noopener noreferrer" class="link-card" style="animation-delay: ${(catIdx * 60) + (linkIdx * 40)}ms" data-link-id="${link.id}">
            <div class="link-favicon">
              ${faviconUrl
                ? `<img src="${escapeHTML(faviconUrl)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'fallback-icon\\'>${initial}</span>'">`
                : `<span class="fallback-icon">${initial}</span>`
              }
            </div>
            <div class="link-info">
              <div class="link-name">${escapeHTML(link.name)}</div>
              <div class="link-url">${escapeHTML(domain)}</div>
            </div>
            <button class="link-delete" data-action="delete-link" data-id="${link.id}" title="Excluir link" onclick="event.preventDefault(); event.stopPropagation();">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </a>
        `;
      });
    } else {
      html += `
        <div style="grid-column: 1 / -1; padding: var(--space-6); text-align: center; color: var(--text-muted); font-size: 13px;">
          Nenhum link neste grupo
        </div>
      `;
    }

    html += `</div></section>`;
  });

  if (query && !hasVisibleContent) {
    html += `
      <div class="no-results">
        <div class="no-results-icon">🔍</div>
        <p>Nenhum resultado para "<strong>${escapeHTML(query)}</strong>"</p>
      </div>
    `;
  }

  if (!query && totalCategories === 0) {
    html += `
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
          </svg>
        </div>
        <h3 class="empty-title">Nenhum grupo criado</h3>
        <p class="empty-description">Crie um grupo para começar a organizar os links da equipe.</p>
      </div>
    `;
  }

  main.innerHTML = html;
  updateGroupSelect();
}

/* ============================================
   GROUP SELECT — for add link modal
   ============================================ */
function updateGroupSelect() {
  const select = document.getElementById('inputLinkGroup');
  select.innerHTML = appData.categories
    .slice()
    .sort((a, b) => (a.order || 0) - (b.order || 0))
    .map(c => `<option value="${c.id}">${escapeHTML(c.name)}</option>`)
    .join('');
}

/* ============================================
   EVENT HANDLERS
   ============================================ */

// Add Link button
document.getElementById('btnAddLink').addEventListener('click', () => {
  if (appData.categories.length === 0) {
    showToast('Crie um grupo antes de adicionar links', 'danger');
    return;
  }
  document.getElementById('inputLinkName').value = '';
  document.getElementById('inputLinkUrl').value = '';
  updateGroupSelect();
  openModal('modalAddLink');
});

// Confirm add link
document.getElementById('btnConfirmAdd').addEventListener('click', addLink);

// Enter key in add link modal
document.getElementById('modalAddLink').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    addLink();
  }
});

function addLink() {
  const name = document.getElementById('inputLinkName').value.trim();
  let url = document.getElementById('inputLinkUrl').value.trim();
  const categoryId = document.getElementById('inputLinkGroup').value;

  if (!name) {
    showToast('Informe o nome do site', 'danger');
    document.getElementById('inputLinkName').focus();
    return;
  }

  // Auto-add https if missing
  if (url && !url.match(/^https?:\/\//i)) {
    url = 'https://' + url;
  }

  if (!isValidUrl(url)) {
    showToast('URL inválida', 'danger');
    document.getElementById('inputLinkUrl').focus();
    return;
  }

  appData.links.push({
    id: crypto.randomUUID(),
    name,
    url,
    categoryId,
    createdAt: Date.now()
  });

  saveData(appData);
  closeModal('modalAddLink');
  render(document.getElementById('searchInput').value);
  showToast(`"${name}" adicionado`, 'success');
}

// Add Category button
document.getElementById('btnAddCategory').addEventListener('click', () => {
  document.getElementById('inputCategoryName').value = '';
  openModal('modalAddCategory');
});

// Confirm add category
document.getElementById('btnConfirmCategory').addEventListener('click', addCategory);

document.getElementById('modalAddCategory').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    addCategory();
  }
});

function addCategory() {
  const name = document.getElementById('inputCategoryName').value.trim();
  if (!name) {
    showToast('Informe o nome do grupo', 'danger');
    document.getElementById('inputCategoryName').focus();
    return;
  }

  appData.categories.push({
    id: crypto.randomUUID(),
    name,
    order: appData.categories.length
  });

  saveData(appData);
  closeModal('modalAddCategory');
  render(document.getElementById('searchInput').value);
  showToast(`Grupo "${name}" criado`, 'success');
}

// Delete link / category — delegated events
let pendingDeleteAction = null;

document.getElementById('mainContent').addEventListener('click', e => {
  // Delete link
  const deleteBtn = e.target.closest('[data-action="delete-link"]');
  if (deleteBtn) {
    e.preventDefault();
    e.stopPropagation();
    const linkId = deleteBtn.dataset.id;
    const link = appData.links.find(l => l.id === linkId);
    if (!link) return;

    document.getElementById('confirmMessage').innerHTML =
      `Tem certeza que deseja excluir <strong>"${escapeHTML(link.name)}"</strong>?`;

    pendingDeleteAction = () => {
      appData.links = appData.links.filter(l => l.id !== linkId);
      saveData(appData);
      render(document.getElementById('searchInput').value);
      showToast(`"${link.name}" excluído`, 'danger');
    };

    openModal('modalConfirm');
    return;
  }

  // Delete category
  const deleteCat = e.target.closest('[data-action="delete-category"]');
  if (deleteCat) {
    const catId = deleteCat.dataset.id;
    const cat = appData.categories.find(c => c.id === catId);
    if (!cat) return;

    const linksCount = appData.links.filter(l => l.categoryId === catId).length;
    document.getElementById('confirmMessage').innerHTML =
      `Tem certeza que deseja excluir o grupo <strong>"${escapeHTML(cat.name)}"</strong>${linksCount > 0 ? ` e seus <strong>${linksCount}</strong> links` : ''}?`;

    pendingDeleteAction = () => {
      appData.links = appData.links.filter(l => l.categoryId !== catId);
      appData.categories = appData.categories.filter(c => c.id !== catId);
      saveData(appData);
      render(document.getElementById('searchInput').value);
      showToast(`Grupo "${cat.name}" excluído`, 'danger');
    };

    openModal('modalConfirm');
    return;
  }

  // Rename category (inline edit)
  const renameBtn = e.target.closest('[data-action="rename-category"]');
  if (renameBtn) {
    const catId = renameBtn.dataset.id;
    const cat = appData.categories.find(c => c.id === catId);
    if (!cat) return;

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'category-edit-input';
    input.value = cat.name;
    input.maxLength = 60;

    renameBtn.replaceWith(input);
    input.focus();
    input.select();

    function finishRename() {
      const newName = input.value.trim();
      if (newName && newName !== cat.name) {
        cat.name = newName;
        saveData(appData);
        showToast(`Grupo renomeado para "${newName}"`, 'success');
      }
      render(document.getElementById('searchInput').value);
    }

    input.addEventListener('blur', finishRename);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = cat.name; input.blur(); }
    });

    return;
  }
});

// Confirm delete
document.getElementById('btnConfirmDelete').addEventListener('click', () => {
  if (pendingDeleteAction) {
    pendingDeleteAction();
    pendingDeleteAction = null;
  }
  closeModal('modalConfirm');
});

// Fiserv badge → About modal
document.getElementById('fiservBadge').addEventListener('click', () => {
  openModal('modalAbout');
});

// Search — real-time filtering
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    render(e.target.value);
  }, 120);
});

/* ============================================
   INITIAL RENDER
   ============================================ */
render();

/* ============================================
   LOAD INTER FONT (non-blocking)
   ============================================ */
(function loadFont() {
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap';
  document.head.appendChild(link);
})();
</script>
</body>
</html>

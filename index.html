<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiservHub — Central de Links</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23FF6600'/><text x='16' y='21' text-anchor='middle' fill='white' font-size='14' font-family='system-ui' font-weight='700'>F</text></svg>">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
/* ...existing CSS... */
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">F</div>
    <div class="logo-text">FiservHub <span>/ links</span></div>
  </div>
  <div class="fiserv-badge">F</div>
</header>
</main>
<main class="main">
  <div class="page-header">
    <h1 class="page-title">Links da equipe</h1>
    <p class="page-subtitle">Central de acesso rápido às ferramentas e plataformas</p>
    <div style="margin-top:24px;display:flex;gap:12px;align-items:center;">
      <input id="search" type="text" placeholder="Buscar links..." style="flex:1;padding:8px 12px;border-radius:6px;border:1px solid #ccc;outline:none;">
    </div>
  </div>
  <div id="categories"></div>
  <div class="footer">
    <p>FiservHub v1.0 — Desenvolvido por Leonardo Vasconcelos</p>
  </div>
</main>
<script>
const categories = [
  { id: "portais", name: "Portais" },
  { id: "atendimento", name: "Ferramentas de Atendimento" },
  { id: "parceiros", name: "Parceiros" },
  { id: "geral", name: "Ferramentas (Geral)" }
];
const links = [
  { name: "Portal do Cliente", url: "https://portaldocliente.softwareexpress.com.br/Login", category: "portais" },
  { name: "Motor", url: "https://admsitef.softwareexpress.com.br/sitefwebadm/pages/inicial.zeus", category: "portais" },
  { name: "Express", url: "https://sitefexpressadm.softwareexpress.com.br/sitefwebadm/pages/inicial.zeus", category: "portais" },
  { name: "GW FULL (5k)", url: "https://oauth.softwareexpress.com.br/auth/realms/sitefconciliacao/protocol/openid-connect/auth?response_type=code&client_id=sitefwebadm&scope=openid&state=RZtJ-ir0uIzBmKKGYU4zcxEmfxrifetf64pElOAfe14%3D&redirect_uri=https://sitefconciliacaoadm.producao.softwareexpress.com.br/sitefwebadm/login/oauth2/callback/keycloak&nonce=cQSJMRW0BpokRdUg8RcQi4oHSmIryr-NOrUVB-Yqhqk", category: "portais" },
  { name: "Springboot (7k)", url: "https://oauth.softwareexpress.com.br/auth/realms/sitefweb/protocol/openid-connect/auth?response_type=code&client_id=sitefwebadm&scope=openid&state=4mkvqI6YP6t2MLE3f8Q13C6H84CizutAIzRbzqBx2EA%3D&redirect_uri=https://sitefwebadm.producao.softwareexpress.com.br/sitefwebadm/login/oauth2/callback/keycloak&nonce=oldq7LoneB1ZKFb3g8XtmLye9z7bnfiZ_Ra96muH4FY", category: "portais" },
  { name: "CallBox", url: "https://fiserv.callbox.com.br/painel/", category: "atendimento" },
  { name: "Chat | Plusoft Omni |", url: "https://fiserv-portalcliente-se.plusoftomni.com.br/", category: "atendimento" },
  { name: "CRM Dynamics 365", url: "https://fiservselatamprd.crm.dynamics.com/main.aspx", category: "atendimento" },
  { name: "Vizzoo", url: "https://vizzoo-web-app.nexxera.io/softwareexpress/login/", category: "parceiros" },
  { name: "Jira - Nexxera", url: "https://jira.nexxera.com/login.jsp?os_destination=%2Fsecure%2FDashboard.jspa", category: "parceiros" },
  { name: "Commander", url: "https://commander.nexxera.io/login", category: "parceiros" },
  { name: "Control-M", url: "https://l1pvap2136.1dc.com:8443/ControlM/", category: "geral" },
  { name: "ServiceNow", url: "https://fiservservicepoint.fiservapps.com/now/nav/ui/classic/params/target/home.do", category: "geral" },
  { name: "Console Remota", url: "https://consoleremota.producao.softwareexpress.com.br/console/pages/inicial.zeus", category: "geral" },
  { name: "Virtru", url: "https://fiserv.secure.virtru.com/control-center/settings", category: "geral" },
  { name: "SFG", url: "https://akpvap104.1dc.com:10001/filegateway/home.do#route", category: "geral" },
  { name: "API - CREDENCIAMENTO DE EXTRATOS", url: "https://credenciamentodeextratos.producao.softwareexpress.com.br/estabelecimentos/view/7096", category: "geral" }
];
function render() {
  const search = document.getElementById('search').value.trim().toLowerCase();
  let html = '';
  categories.forEach(cat => {
    const catLinks = links.filter(l => l.category === cat.id && (!search || l.name.toLowerCase().includes(search) || l.url.toLowerCase().includes(search)));
    if (catLinks.length === 0) return;
    html += `<section class="category-section"><div class="category-header"><div class="category-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></div><span class="category-title">${cat.name}</span><span class="category-count">${catLinks.length}</span></div><div class="links-grid">`;
    catLinks.forEach(link => {
      html += `<a href="${link.url}" target="_blank" rel="noopener noreferrer" class="link-card"><div class="link-favicon"><img src="https://www.google.com/s2/favicons?domain=${(new URL(link.url)).hostname}&sz=64" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<span class=fallback-icon>${link.name[0]}</span>'"></div><div class="link-info"><div class="link-name">${link.name}</div><div class="link-url">${(new URL(link.url)).hostname}</div></div><svg class="link-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>`;
    });
    html += '</div></section>';
  });
  document.getElementById('categories').innerHTML = html;
}
window.onload = function() {
  document.getElementById('search').addEventListener('input', render);
  render();
};
</script>
</body>
</html>
